<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бот для работы со счётчиками</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 30px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .menu-button {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 16px 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        
        .menu-button:active {
            opacity: 0.8;
        }
        
        .menu-button span {
            font-size: 24px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--tg-theme-hint-color, #999999);
            font-size: 12px;
            padding: 20px 0;
        }
        
        /* Темная тема */
        @media (prefers-color-scheme: dark) {
            body {
                background: var(--tg-theme-bg-color, #1c1c1e);
                color: var(--tg-theme-text-color, #ffffff);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Бот для работы со счётчиками</h1>
        <div class="subtitle">Выберите нужный режим работы</div>
        
        <div class="menu-grid">
            <button class="menu-button" onclick="sendCommand('plomb')">
                <span>🔍</span>
                Обработка пломб
            </button>
            
            <button class="menu-button" onclick="sendCommand('guarantee')">
                <span>📋</span>
                Реестр гарантии
            </button>
            
            <button class="menu-button" onclick="sendCommand('scan')">
                <span>📦</span>
                Сканировать штрихкоды
            </button>
            
            <button class="menu-button" onclick="sendCommand('template')">
                <span>📎</span>
                Загрузить шаблон
            </button>
            
            <button class="menu-button" onclick="sendCommand('qr')">
                <span>📲</span>
                Генерация QR-кодов
            </button>
            
            <button class="menu-button" onclick="sendCommand('supply')">
                <span>🚚</span>
                Новая поставка
            </button>
            
            <button class="menu-button full-width" onclick="sendCommand('help')">
                <span>❓</span>
                Помощь
            </button>
        </div>
        
        <div class="footer">
            <div id="user-info">Загрузка...</div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
        
        // Растягиваем на всю высоту
        tg.expand();
        
        // Получаем информацию о пользователе
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerHTML = 
                `👤 ${user.first_name} ${user.last_name || ''}<br>ID: ${user.id}`;
        } else {
            document.getElementById('user-info').innerHTML = '👤 Пользователь не определён';
        }
        
        // Функция отправки команды в бота
        function sendCommand(command) {
            // Создаем данные для отправки
            const data = JSON.stringify({
                action: command,
                user_id: user?.id,
                timestamp: Date.now()
            });
            
            // Отправляем данные в бота и закрываем приложение
            tg.sendData(data);
            tg.close();
        }
        
        // Показываем основную кнопку при наведении (опционально)
        tg.MainButton.setText('Выберите действие');
        tg.MainButton.hide();
        
        // Обработка кнопки "Назад" в Telegram
        tg.onEvent('backButtonClicked', function() {
            tg.close();
        });
    </script>
</body>
</html>
